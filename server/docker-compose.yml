version: '3.8'

services:
  # ── Node.js API + WebSocket server ──────────────────────────────────────
  node_server:
    build: .
    container_name: game_server
    expose:
      - "3000"          # Port intern no exposat directament
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  # ── Proxy invers nginx ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: game_nginx
    ports:
      - "80:80"         # Unic port exposat externament
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node_server
    restart: unless-stopped
